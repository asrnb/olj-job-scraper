<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnlineJobs.ph Scraper</title>
  <link rel="stylesheet" href="sidepanel.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="panel">
    <!-- Header with logo and title -->
    <header class="panel-header">
      <div class="header-brand">
        <span class="header-icon">&#128188;</span>
        <h1 class="header-title">OLJ Scraper</h1>
      </div>
      <p class="header-subtitle">OnlineJobs.ph Job Search</p>
    </header>

    <!-- Search controls -->
    <div class="search-section">
      <div class="input-group">
        <label for="keyword">Keyword</label>
        <input type="text" id="keyword" placeholder="e.g. Virtual Assistant" />
      </div>
      <div class="input-row">
        <div class="input-group flex-1">
          <label for="delay">Delay (ms)</label>
          <input type="number" id="delay" min="0" placeholder="500" value="500" />
        </div>
        <button id="searchBtn">
          <span class="btn-icon">&#128269;</span> Search
        </button>
      </div>
    </div>

    <!-- Results count -->
    <div id="resultCount" class="result-count hidden"></div>

    <!-- Job results -->
    <div id="results" class="results"></div>

    <!-- Load More -->
    <button id="loadMoreBtn" class="load-more hidden">Load More Jobs</button>

    <!-- Clear cache -->
    <button id="clearCacheBtn" class="clear-cache">Clear Cached Results</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
